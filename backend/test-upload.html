<!DOCTYPE html>
<html>
<head>
  <title>Upload Assignment</title>
</head>
<body>

<h2>Upload Assignment</h2>

<form
  action="http://localhost:5000/api/assignments/upload"
  method="POST"
  enctype="multipart/form-data"
>
  <input
    type="text"
    name="title"
    placeholder="Title"
  />

  <br><br>

  <input
    type="text"
    name="description"
    placeholder="Description"
  />

  <br><br>

  <input
    type="file"
    name="file"
  />

  <br><br>

  <button type="submit">
    Upload
  </button>

</form>

</body>
</html>
