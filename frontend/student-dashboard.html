<div class="container">

```
<div class="card">
    <h3>Welcome Student</h3>

    <button onclick="window.location.href='upload.html'">
        Upload Assignment
    </button>

    <!-- <button onclick="loadAssignments()">
        View Assignments
    </button> -->

<div class="card">
    <h3>My Assignments</h3>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>File Type</th>
            </tr>
        </thead>

        <tbody id="assignmentTable">
        </tbody>
    </table>
</div>
```

</div>

<script>

async function loadAssignments(){

    try{

        const response = await fetch(
            "http://localhost:5000/api/assignments"
        );

        const assignments = await response.json();

        let rows = "";

        assignments.forEach(item => {

            rows += `
            <tr>
                <td>${item.title}</td>
                <td>${item.description}</td>
                <td>${item.fileType}</td>
            </tr>
            `;

        });

        document.getElementById("assignmentTable").innerHTML = rows;

    }
    catch(error){

        console.log(error);

    }

}

window.onload = loadAssignments;

</script>

</body>
