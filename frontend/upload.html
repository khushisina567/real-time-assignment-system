<!DOCTYPE html>
<html>
<head>
<title>Upload Assignment</title>
</head>
<body>

<h2>Upload Assignment</h2>

<form id="uploadForm">

<input
type="text"
name="title"
placeholder="Title"
required
>

<br><br>

<input
type="text"
name="description"
placeholder="Description"
required
>

<br><br>

<input
type="file"
name="file"
required
>

<br><br>

<button type="submit">
Upload
</button>

</form>

<script>

document
.getElementById("uploadForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const formData = new FormData(e.target);

const response = await fetch(
"http://localhost:5000/api/assignments/upload",
{
method:"POST",
body:formData
}
);

const data = await response.json();

alert(data.message);

});

</script>

</body>
</html>
